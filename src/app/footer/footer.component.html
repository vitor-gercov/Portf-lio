<footer class="footer">
  <div class="footer__inner">
    <p class="footer__copy">
      &copy; {{ currentYear }} Vitor Gobato Gercov. <ng-container i18n="@@footer.rights">Todos os direitos
        reservados.</ng-container>
    </p>

    <nav class="footer__social" aria-label="Redes sociais" i18n-aria-label="@@footer.socialAriaLabel">
      @for (link of socialLinks; track link.icon) {
      <a [href]="link.href" class="footer__social-link" target="_blank" rel="noopener noreferrer"
        [attr.aria-label]="link.ariaLabel">
        <svg class="footer__icon" aria-hidden="true" focusable="false">
          <use [attr.href]="'#icon-' + link.icon" />
        </svg>
        <span class="footer__social-label">{{ link.label }}</span>
      </a>
      }
    </nav>
  </div>

  <!-- SVG sprite — substitua os paths pelos ícones reais -->
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
    <!-- LinkedIn -->
    <symbol id="icon-linkedin" viewBox="0 0 24 24">
      <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z" />
      <rect x="2" y="9" width="4" height="12" />
      <circle cx="4" cy="4" r="2" />
    </symbol>

    <!-- GitHub -->
    <symbol id="icon-github" viewBox="0 0 24 24">
      <path
        d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22" />
    </symbol>

    <!-- WhatsApp -->
    <symbol id="icon-whatsapp" viewBox="0 0 24 24">
      <path
        d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" />
    </symbol>

    <!-- E-mail -->
    <symbol id="icon-email" viewBox="0 0 24 24">
      <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
      <polyline points="22,6 12,13 2,6" />
    </symbol>
  </svg>
</footer>
