<section id="hero" class="hero" aria-label="Seção de apresentação" i18n-aria-label="@@hero.ariaLabel" tabindex="-1">
  <div class="hero__background" aria-hidden="true">
    <div class="hero__glow"></div>
    <div class="hero__fade"></div>
  </div>

  <div class="hero__content">
    <span class="hero__badge">
      <span class="hero__badge-dot" aria-hidden="true"></span>
      Portfolio
    </span>

    <h1 class="hero__title">
      <span class="hero__title-first">Vitor Gobato</span>
      <span class="hero__title-last">Gercov</span>
    </h1>

    <p class="hero__subtitle" i18n="@@hero.subtitle">Engenheiro de Software</p>
  </div>

  <div class="hero__scroll" aria-hidden="true">
    <span class="hero__scroll-label">scroll</span>
    <div class="hero__scroll-line"></div>
  </div>
</section>
